  <!-- ============ QUESTION 2: EXAMPLE — HI-FI THEME QUESTION WITH LIVE PREVIEW ============ -->

    </div>

    <div class="grid grid-cols-[1fr_1.2fr] gap-6">
      <!-- Option selectors -->
      <div class="space-y-3">
        <button class="option-card w-full text-left border-2 border-slate-200 rounded-lg p-3 hover:border-slate-400 transition"
                data-question-id="2" data-option="A" data-label="浅色主题" data-preview-theme="light">
          <div class="flex items-center gap-3">

            <div>

              <div class="text-xs text-slate-500">白底深字，专业、信任感</div>
            </div>
          </div>
        </button>

        <button class="option-card w-full text-left border-2 border-slate-200 rounded-lg p-3 hover:border-slate-400 transition"
                data-question-id="2" data-option="B" data-label="深色主题" data-preview-theme="dark">
          <div class="flex items-center gap-3">

          <button class="px-3 py-1.5 rounded text-sm preview-button">主要按钮</button>

  <!-- ============ QUESTION 3: EXAMPLE — MERMAID FLOW DIAGRAM QUESTION ============ -->

        <div class="text-xs font-semibold text-slate-500 mb-2">选项 A · 同步处理</div>
        <div class="mermaid bg-slate-50 rounded p-2">

flowchart LR

<!-- Sticky footer: answer collector -->
<footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-30">

      <div class="text-xs text-slate-500 mb-1">当前选择</div>
      <div id="answer-summary" class="text-sm mono text-slate-700">尚未选择</div>
    </div>
    <button id="copy-btn"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium text-sm disabled:bg-slate-300 disabled:cursor-not-allowed"
            disabled>
      复制答案
    </button>
  </div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded shadow-lg z-40">
  已复制到剪贴板
</div>

<script>
  // ============ STATE ============
  // Fill this in to match the questions above. Keep order identical.
  const QUESTIONS = [
    { id: '1', text: '导航栏位置' },
    { id: '2', text: '配色主题' },
    { id: '3', text: '文件处理流程' },
  ];
  const selections = {}; // { '1': { option: 'A', label: '顶部导航' }, ... }

  // ============ TIMESTAMP ============
  document.getElementById('timestamp').textContent = new Date().toLocaleString('zh-CN');

  // ============ MERMAID ============
  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
  }

  // ============ OPTION SELECTION ============
  document.querySelectorAll('.option-card').forEach(card => {
    card.addEventListener('click', () => {
      const qid = card.dataset.questionId;
      const opt = card.dataset.option;
      const label = card.dataset.label;

      // Deselect siblings in the same question
      document.querySelectorAll(`.option-card[data-question-id="${qid}"]`).forEach(c => {
        c.dataset.selected = 'false';
      });
      card.dataset.selected = 'true';

      selections[qid] = { option: opt, label };

      // Live preview hook (Q2 theme example)
      if (card.dataset.previewTheme) {
        applyThemePreview(card.dataset.previewTheme);
      }

      updateSummary();
    });
  });

  // ============ LIVE PREVIEW: THEME ============
  function applyThemePreview(theme) {
    const pv = document.getElementById('theme-preview');
    if (!pv) return;
    if (theme === 'dark') {
      pv.className = 'rounded-lg border p-4 transition-colors bg-slate-900 border-slate-700 text-slate-100';
      pv.querySelector('.preview-heading').className = 'font-semibold preview-heading text-white';
      pv.querySelector('.preview-body').className = 'text-sm preview-body text-slate-300';
      pv.querySelector('.preview-button').className = 'px-3 py-1.5 rounded text-sm preview-button bg-blue-500 text-white';
    } else {
      pv.className = 'rounded-lg border p-4 transition-colors bg-white border-slate-200 text-slate-900';
      pv.querySelector('.preview-heading').className = 'font-semibold preview-heading text-slate-900';
      pv.querySelector('.preview-body').className = 'text-sm preview-body text-slate-600';
      pv.querySelector('.preview-button').className = 'px-3 py-1.5 rounded text-sm preview-button bg-blue-600 text-white';
    }
  }

  // ============ SUMMARY + COPY ============
  function updateSummary() {
    const summaryEl = document.getElementById('answer-summary');
    const btn = document.getElementById('copy-btn');
    const parts = QUESTIONS.map(q => {
      const s = selections[q.id];
      return s ? `Q${q.id}: ${s.option} (${s.label})` : `Q${q.id}: —`;
    });
    summaryEl.textContent = parts.join('  ·  ');
    btn.disabled = Object.keys(selections).length === 0;
  }

  document.getElementById('copy-btn').addEventListener('click', async () => {
    const text = QUESTIONS
      .filter(q => selections[q.id])
      .map(q => `Q${q.id}: ${selections[q.id].option}  (${selections[q.id].label})`)
      .join('\n');
    try {
      await navigator.clipboard.writeText(text);
      showToast('已复制到剪贴板');
    } catch (e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
      showToast('已复制到剪贴板');
    }
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    t.classList.add('toast-visible');
    setTimeout(() => { t.classList.add('hidden'); t.classList.remove('toast-visible'); }, 1800);
  }

  // ============ KEYBOARD SHORTCUTS ============
  // Press 1/2/3 to select options within the currently-hovered question
  let focusedQuestion = null;
  document.querySelectorAll('section[data-question]').forEach(sec => {
    sec.addEventListener('mouseenter', () => { focusedQuestion = sec.dataset.question; });
  });
  document.addEventListener('keydown', (e) => {
    if (!focusedQuestion) return;
    if (!['1','2','3','4'].includes(e.key)) return;
    const idx = parseInt(e.key) - 1;
    const cards = document.querySelectorAll(`.option-card[data-question-id="${focusedQuestion}"]`);
    if (cards[idx]) cards[idx].click();
  });
</script>

</body>
</html>
